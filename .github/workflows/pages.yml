name: GitHub Pages (Design-Vorschau)

# Veröffentlicht die statische Design-/Animations-Vorschau (web/) als installierbare
# Web-App (PWA) auf GitHub Pages. Reine Optik, ohne Funktion/Server.
# Hinweis: GitHub Pages ist für PRIVATE Repos nur mit bezahltem Plan verfügbar.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pages konfigurieren (aktiviert Pages, falls möglich)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Web-App als Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
