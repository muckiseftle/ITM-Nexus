<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#2563EB" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NEXUS" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="icon" href="icon.svg" />
    <title>NEXUS</title>
    <style>
      :root {
        --brandPrimary: #2563eb;
        --brandPrimaryDark: #1d4ed8;
        --accent: #0ea5e9;
        --success: #16a34a;
        --warning: #d97706;
        --danger: #dc2626;
        --bgCanvas: #ffffff;
        --bgElevated: #f7f8fa;
        --textPrimary: #0b0f14;
        --textSecondary: #5b6573;
        --xxs: 4px; --xs: 8px; --sm: 12px; --md: 16px; --lg: 24px; --xl: 32px;
        --rsm: 8px; --rmd: 12px; --rlg: 16px; --pill: 999px;
        --fTitle: 28px; --fHeadline: 20px; --fBody: 16px; --fCaption: 13px;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0; height: 100%; background: #0b0f14;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        overscroll-behavior: none;
      }
      #app {
        display: flex; flex-direction: column; height: 100vh; height: 100dvh; min-height: 540px;
        max-width: 480px; margin: 0 auto; background: var(--bgCanvas); position: relative; overflow: hidden;
      }
      #screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom); }
      .pad-top { padding-top: env(safe-area-inset-top); }

      @keyframes inForward { from{opacity:0;transform:translateX(26px)} to{opacity:1;transform:none} }
      @keyframes inBack { from{opacity:0;transform:translateX(-26px)} to{opacity:1;transform:none} }
      @keyframes inFade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
      @keyframes rowIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
      .stagger > .row, .stagger > .c-row, .stagger > .cal-row, .stagger > .card { animation: rowIn .32s ease both; }
      .stagger > *:nth-child(2){animation-delay:.02s}.stagger > *:nth-child(3){animation-delay:.05s}
      .stagger > *:nth-child(4){animation-delay:.08s}.stagger > *:nth-child(5){animation-delay:.11s}
      .stagger > *:nth-child(6){animation-delay:.14s}.stagger > *:nth-child(7){animation-delay:.17s}

      #tabbar {
        display: flex; border-top: 1px solid var(--bgElevated);
        background: rgba(255,255,255,.92); backdrop-filter: saturate(180%) blur(12px);
        -webkit-backdrop-filter: saturate(180%) blur(12px); padding-bottom: env(safe-area-inset-bottom);
      }
      .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: var(--xs) 0;
        color: var(--textSecondary); cursor: pointer; user-select: none; transition: color .18s; }
      .tab svg { width: 24px; height: 24px; transition: transform .18s ease; }
      .tab .tablabel { font-size: 10px; }
      .tab.active { color: var(--brandPrimary); font-weight: 700; }
      .tab.active svg { transform: translateY(-1px) scale(1.08); }
      .tab:active svg { transform: scale(.9); }

      .header { position: sticky; top: 0; z-index: 6; background: var(--bgCanvas); }
      .appbar { display: flex; align-items: center; gap: var(--xs); padding: var(--sm) var(--md) var(--xs); }
      .appbar .title { flex: 1; font-size: var(--fHeadline); font-weight: 700; color: var(--textPrimary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .iconbtn { width: 40px; height: 40px; border-radius: var(--pill); display: flex; align-items: center;
        justify-content: center; color: var(--textPrimary); background: transparent; border: none; transition: background .15s, transform .12s; }
      .iconbtn:active { background: var(--bgElevated); transform: scale(.92); }
      .iconbtn svg { width: 23px; height: 23px; }
      .iconbtn.brand { color: var(--brandPrimary); }
      .appsearch { padding: 0 var(--md) var(--xs); }
      .appsearch input { width: 100%; background: var(--bgElevated); border: 1px solid transparent; border-radius: var(--pill);
        padding: 10px var(--md); font-size: var(--fBody); font-family: inherit; color: var(--textPrimary); transition: border-color .15s; }
      .appsearch input:focus { outline: none; border-color: var(--brandPrimary); }
      .subtitle { padding: 0 var(--md) var(--xs); color: var(--textSecondary); font-size: var(--fCaption); margin-top: -2px; }

      .row { display: flex; padding: var(--md); border-bottom: 1px solid var(--bgElevated); cursor: pointer; transition: background .15s; }
      .row:active { background: #eef1f5; }
      .dot { width: 8px; height: 8px; border-radius: 4px; background: var(--brandPrimary); margin-right: var(--sm); margin-top: var(--xs); flex: 0 0 auto; }
      .row-body { flex: 1; min-width: 0; }
      .sender { color: var(--textPrimary); font-size: var(--fBody); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .sender.unread { font-weight: 800; }
      .subject { color: var(--textPrimary); font-size: var(--fBody); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .preview { color: var(--textSecondary); font-size: var(--fCaption); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .flag { color: var(--warning); font-size: var(--fBody); margin-left: var(--sm); }
      .empty { color: var(--textSecondary); font-size: var(--fBody); text-align: center; padding: var(--lg); }

      .back { padding: var(--sm) var(--md); color: var(--brandPrimary); font-size: var(--fBody); cursor: pointer; position: sticky; top: 0; background: var(--bgCanvas); z-index: 5; }
      .content { padding: var(--md); }
      .msg-subject { font-size: var(--fHeadline); font-weight: 700; color: var(--textPrimary); margin: 0 0 var(--xs); }
      .meta { color: var(--textSecondary); font-size: var(--fCaption); margin-top: var(--xxs); }
      .categories { color: var(--accent); font-size: var(--fCaption); margin-top: var(--xs); }
      .body-text { color: var(--textPrimary); font-size: var(--fBody); margin-top: var(--md); white-space: pre-wrap; line-height: 1.45; }
      .actions { display: flex; flex-wrap: wrap; gap: var(--xs); padding: var(--md); border-top: 1px solid var(--bgElevated); }
      .action { flex: 1 1 28%; background: var(--bgElevated); border: none; border-radius: var(--rsm); padding: var(--sm);
        font-size: var(--fCaption); font-weight: 600; color: var(--textPrimary); text-align: center; transition: transform .12s; }
      .action:active { transform: scale(.95); background: #eceef1; }
      .action.primary { color: var(--brandPrimary); font-weight: 700; }
      .action.danger { color: var(--danger); }

      .label { color: var(--textSecondary); font-size: var(--fCaption); margin-bottom: var(--xxs); display: block; }
      .input { width: 100%; background: var(--bgElevated); border: 1px solid transparent; border-radius: var(--rmd);
        color: var(--textPrimary); font-size: var(--fBody); padding: var(--md); margin-bottom: var(--sm); font-family: inherit; transition: border-color .15s; }
      .input:focus { outline: none; border-color: var(--brandPrimary); }
      textarea.input { min-height: 200px; resize: vertical; }
      .bar { display: flex; align-items: center; justify-content: space-between; padding: var(--sm) var(--md); position: sticky; top: 0; background: var(--bgCanvas); z-index: 5; }
      .bar.border { border-bottom: 1px solid var(--bgElevated); }
      .bar-title { font-size: var(--fHeadline); font-weight: 700; color: var(--textPrimary); }
      .bar-action { color: var(--textSecondary); font-size: var(--fBody); cursor: pointer; }
      .bar-send { color: var(--brandPrimary); font-size: var(--fBody); font-weight: 700; cursor: pointer; }
      .from { color: var(--textSecondary); font-size: var(--fCaption); margin-top: var(--md); }

      .cal-row { display: flex; padding: var(--md); border-bottom: 1px solid var(--bgElevated); }
      .when { width: 92px; margin-right: var(--md); flex: 0 0 auto; }
      .day { color: var(--textPrimary); font-size: var(--fCaption); font-weight: 600; }
      .time { color: var(--brandPrimary); font-size: var(--fCaption); }
      .name { color: var(--textPrimary); font-size: var(--fBody); font-weight: 600; }
      .sub { color: var(--textSecondary); font-size: var(--fCaption); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .c-row { display: flex; align-items: center; padding: var(--md); border-bottom: 1px solid var(--bgElevated); }
      .avatar { width: 40px; height: 40px; border-radius: var(--pill); background: var(--brandPrimary); color: #fff;
        font-size: var(--fCaption); font-weight: 700; display: flex; align-items: center; justify-content: center; margin-right: var(--md); flex: 0 0 auto; }

      .settings-head { font-size: var(--fTitle); font-weight: 700; color: var(--textPrimary); padding: var(--md) var(--md) var(--xs); }
      .section-title { font-size: var(--fCaption); font-weight: 700; color: var(--textSecondary); text-transform: uppercase; letter-spacing: .04em; padding: var(--lg) var(--md) var(--xs); }
      .card { background: var(--bgElevated); border-radius: var(--rmd); margin: 0 var(--md); overflow: hidden; }
      .item { display: flex; align-items: center; gap: var(--sm); padding: var(--md); border-bottom: 1px solid #eceef1; transition: background .15s; }
      .item:last-child { border-bottom: none; }
      .item:active { background: #eceef1; }
      .item .grow { flex: 1; min-width: 0; }
      .item-title { font-size: var(--fBody); color: var(--textPrimary); }
      .item-sub { font-size: var(--fCaption); color: var(--textSecondary); margin-top: 2px; }
      .item-value { font-size: var(--fBody); color: var(--textSecondary); }
      .chev { color: var(--textSecondary); font-size: var(--fBody); }
      .add-text { color: var(--brandPrimary); font-weight: 600; }
      .danger-text { color: var(--danger); }
      .pill-on { font-size: var(--fCaption); font-weight: 700; color: var(--success); }
      .kindtag { font-size: 11px; font-weight: 700; color: var(--accent); flex: 0 0 auto; }
      .switch { width: 46px; height: 28px; border-radius: var(--pill); background: #cfd4da; position: relative; flex: 0 0 auto; transition: background .25s; }
      .switch.on { background: var(--success); }
      .switch::after { content:''; position: absolute; top: 2px; left: 2px; width: 24px; height: 24px; border-radius: 50%;
        background: #fff; transition: left .25s cubic-bezier(.4,1.3,.5,1); box-shadow: 0 1px 3px rgba(0,0,0,.25); }
      .switch.on::after { left: 20px; }
      .check { color: var(--brandPrimary); font-weight: 700; font-size: var(--fBody); }

      .drawer { position: absolute; inset: 0; z-index: 40; visibility: hidden; }
      .drawer.open { visibility: visible; }
      .scrim { position: absolute; inset: 0; background: rgba(0,0,0,.4); opacity: 0; transition: opacity .25s; }
      .drawer.open .scrim { opacity: 1; }
      .drawer-panel { position: absolute; top: 0; left: 0; bottom: 0; width: 84%; max-width: 340px; background: var(--bgCanvas);
        box-shadow: 2px 0 24px rgba(0,0,0,.25); transform: translateX(-100%); transition: transform .28s cubic-bezier(.2,.8,.2,1);
        display: flex; flex-direction: column; overflow-y: auto; padding-top: env(safe-area-inset-top); }
      .drawer.open .drawer-panel { transform: none; }
      .drawer-acct { display: flex; align-items: center; gap: var(--sm); padding: var(--md); background: var(--brandPrimary); color: #fff; cursor: pointer; }
      .drawer-acct .ava { width: 42px; height: 42px; border-radius: var(--pill); background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-weight: 700; flex: 0 0 auto; }
      .drawer-acct .grow { flex: 1; min-width: 0; }
      .drawer-acct .an { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .drawer-acct .ae { font-size: var(--fCaption); opacity: .85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .drawer-acct svg { width: 22px; height: 22px; }
      .drawer-section { font-size: var(--fCaption); font-weight: 700; color: var(--textSecondary); text-transform: uppercase; letter-spacing: .04em; padding: var(--md) var(--md) var(--xxs); }
      .frow { display: flex; align-items: center; gap: var(--sm); padding: 11px var(--md); color: var(--textPrimary); cursor: pointer; }
      .frow:active { background: var(--bgElevated); }
      .frow.active { background: #eaf0fe; color: var(--brandPrimary); font-weight: 700; }
      .frow .fname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .frow svg { width: 20px; height: 20px; flex: 0 0 auto; }
      .frow.depth1 { padding-left: 44px; }
      .badge { background: var(--brandPrimary); color: #fff; border-radius: var(--pill); font-size: 11px; font-weight: 700; padding: 1px 7px; flex: 0 0 auto; }
      .mbx { display: flex; align-items: center; gap: var(--sm); padding: 10px var(--md); cursor: pointer; }
      .mbx:active { background: var(--bgElevated); }
      .mbx.active { color: var(--brandPrimary); }
      .mbx svg { width: 20px; height: 20px; flex: 0 0 auto; }
      .mbx .grow { flex: 1; min-width: 0; }
      .mbx .mn { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }

      #toast { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(20px); background: #0b0f14;
        color: #fff; font-size: var(--fCaption); padding: 10px 16px; border-radius: var(--pill); opacity: 0; transition: all .25s;
        pointer-events: none; white-space: nowrap; z-index: 60; }
      #toast.show { opacity: .96; transform: translateX(-50%) translateY(0); }

      #splash { position: absolute; inset: 0; background: var(--brandPrimary); display: flex; align-items: center; justify-content: center; z-index: 100; animation: splashOut .5s ease .9s forwards; }
      #splash .word { color: #fff; font-size: 40px; font-weight: 800; letter-spacing: 2px; opacity: 0; transform: scale(.8); animation: wordIn .6s cubic-bezier(.2,.9,.3,1) forwards; }
      @keyframes wordIn { to { opacity: 1; transform: scale(1); } }
      @keyframes splashOut { to { opacity: 0; visibility: hidden; } }
      @media (prefers-reduced-motion: reduce) { * { animation-duration: .01ms !important; } }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="screen" class="pad-top"></div>
      <div id="tabbar"></div>
      <div id="drawer" class="drawer">
        <div class="scrim" onclick="closeDrawer()"></div>
        <div class="drawer-panel" id="drawerPanel"></div>
      </div>
      <div id="toast"></div>
      <div id="splash"><div class="word">NEXUS</div></div>
    </div>

        junk: '<circle cx="12" cy="12" r="9"/><path d="m5 5 14 14"/>',
        deleted: '<path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/>',

      };
      const svg = (p) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

      const TABS = [
        { key: 'mail', label: 'Mail', icon: I.mail },
        { key: 'calendar', label: 'Kalender', icon: I.calendar },

        { key: 'settings', label: 'Mehr', icon: I.settings },
      ];
      let tab = 'mail';

      let pendingAnim = 'fade';
      let drawerOpen = false, drawerView = 'folders';
      const q = { mail: '', calendar: '', contacts: '' };

      const settings = { syncWindow: '1m', syncInterval: '5m', push: true, background: true, wifiOnly: false, appLock: true };
      const WINDOW_OPTS = [
        { key: '1w', label: '1 Woche' }, { key: '1m', label: '1 Monat' }, { key: '3m', label: '3 Monate' },
        { key: '6m', label: '6 Monate' }, { key: 'all', label: 'Alle Nachrichten' },
      ];
      const INTERVAL_OPTS = [
        { key: '1m', label: 'Alle 1 Minute' }, { key: '5m', label: 'Alle 5 Minuten' },
        { key: '15m', label: 'Alle 15 Minuten' }, { key: 'manual', label: 'Manuell' },
      ];
      const labelOf = (o, k) => (o.find((x) => x.key === k) || {}).label || k;

      const screenEl = document.getElementById('screen');
      const tabbarEl = document.getElementById('tabbar');
      const toastEl = document.getElementById('toast');
      const drawerEl = document.getElementById('drawer');
      const drawerPanel = document.getElementById('drawerPanel');
      const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]);
      const acct = () => accounts.find((a) => a.id === currentAccount);
      const mbxList = () => mailboxesByAccount[currentAccount] || [];
      const mbx = () => mbxList().find((m) => m.id === currentMailbox) || mbxList()[0];
      const folderName = (id) => (foldersFor(currentMailbox).find((f) => f.id === id) || {}).name || id;
      const byId = (id) => messages.find((m) => m.id === id);
      const initials = (n) => n.split(/\s+/).slice(0, 2).map((p) => p.charAt(0).toUpperCase()).join('');

      function folderMsgs() {
        const needle = q.mail.trim().toLowerCase();
        return messages
          .filter((m) => m.account === currentAccount && m.mailbox === currentMailbox && m.folderId === currentFolder)
          .filter((m) => !needle || m.subject.toLowerCase().includes(needle) || m.preview.toLowerCase().includes(needle) || m.fromName.toLowerCase().includes(needle))
          .sort((a, b) => b.receivedAt - a.receivedAt);
      }
      function unreadIn(folderId) {
        return messages.filter((m) => m.account === currentAccount && m.mailbox === currentMailbox && m.folderId === folderId && !m.read).length;
      }
      function toast(t) { toastEl.textContent = t; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), 1600); }
      const fmtTime = (ms) => new Date(ms).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      const fmtDay = (ms) => new Date(ms).toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: 'short' });

      function header(title, opts) {
        opts = opts || {};
        const left = opts.folders ? `<button class="iconbtn" onclick="openDrawer()">${svg(I.folders)}</button>` : '';
        const right = opts.compose ? `<button class="iconbtn brand" onclick="openCompose()">${svg(I.compose)}</button>` : '';
        const search = opts.searchKey
          ? `<div class="appsearch"><input placeholder="${esc(opts.placeholder || 'Suchen')}" value="${esc(q[opts.searchKey] || '')}" oninput="q['${opts.searchKey}']=this.value;rerender()"></div>`
          : '';
        const subtitle = opts.subtitle ? `<div class="subtitle">${esc(opts.subtitle)}</div>` : '';
        return `<div class="header"><div class="appbar">${left}<div class="title">${esc(title)}</div>${right}</div>${subtitle}${search}</div>`;
      }

      function renderMailList() {
        const list = folderMsgs();
        const rows = list.map((m) => `
          <div class="row" onclick="openMessage('${m.id}')">
            <div class="dot" style="opacity:${m.read ? 0 : 1}"></div>
            <div class="row-body">
              <div class="sender ${m.read ? '' : 'unread'}">${esc(m.fromName)}</div>
              <div class="subject">${esc(m.subject)}</div>
              <div class="preview">${esc(m.preview)}</div>
            </div>
            ${m.flagged ? '<div class="flag">⚑</div>' : ''}
          </div>`).join('');
        const sub = mbx().kind !== 'primary' ? KIND_LABEL[mbx().kind] + ' · ' + mbx().addr : null;
        return header(folderName(currentFolder), { folders: true, compose: true, searchKey: 'mail', placeholder: 'In „' + folderName(currentFolder) + '" suchen', subtitle: sub })
          + `<div class="stagger">${list.length ? rows : '<div class="empty">Keine Nachrichten.</div>'}</div>`;
      }
      function renderMessage(id) {
        const m = byId(id);
        if (!m) return '<div class="empty">Nachricht nicht gefunden.</div>';
        return `
          <div class="back" onclick="goList()">‹ ${esc(folderName(currentFolder))}</div>
          <div class="content">
            <h1 class="msg-subject">${esc(m.subject)}</h1>
            <div class="meta">${esc(m.fromName)} &lt;${esc(m.fromAddress)}&gt;</div>
            ${m.categories.length ? `<div class="categories">${esc(m.categories.join(' · '))}</div>` : ''}
            <div class="body-text">${esc(m.body)}</div>
          </div>
          <div class="actions">
            <button class="action primary" onclick="replyTo('${m.id}')">Antworten</button>
            <button class="action" onclick="toggleRead('${m.id}')">${m.read ? 'Ungelesen' : 'Gelesen'}</button>
            <button class="action" onclick="toggleFlag('${m.id}')">${m.flagged ? 'Entmarkieren' : 'Markieren'}</button>
            <button class="action" onclick="archive('${m.id}')">Archiv</button>
            <button class="action danger" onclick="del('${m.id}')">Löschen</button>
          </div>`;
      }
      function renderCompose(replyId) {
        const r = replyId ? byId(replyId) : null;
        const to = r ? r.fromAddress : '';
        const subject = r ? (r.subject.startsWith('Re:') ? r.subject : 'Re: ' + r.subject) : '';
        const from = mbx().addr;
        return `
          <div class="bar border"><span class="bar-action" onclick="goList()">Abbrechen</span>
            <span class="bar-title" style="font-size:var(--fBody);font-weight:600">${r ? 'Antworten' : 'Neue E-Mail'}</span>
            <span class="bar-send" onclick="sendMail()">Senden</span></div>
          <div class="content">
            <label class="label">An</label>
            <input id="c-to" class="input" inputmode="email" placeholder="empfaenger@firma.de" value="${esc(to)}" />
            <label class="label">Betreff</label>
            <input id="c-subject" class="input" placeholder="Betreff" value="${esc(subject)}" />
            <label class="label">Nachricht</label>
            <textarea id="c-body" class="input" placeholder="Text verfassen…"></textarea>
            <div class="from">Von: ${esc(from)}${mbx().kind === 'delegated' ? ' (im Auftrag)' : ''}</div>
          </div>`;
      }
      function renderCalendar() {
        const needle = q.calendar.trim().toLowerCase();
        const list = events.filter((e) => !needle || e.subject.toLowerCase().includes(needle) || (e.location || '').toLowerCase().includes(needle)).sort((a, b) => a.startAt - b.startAt);
        const rows = list.map((e) => `
          <div class="cal-row"><div class="when"><div class="day">${fmtDay(e.startAt)}</div><div class="time">${fmtTime(e.startAt)}</div></div>
            <div style="flex:1;min-width:0"><div class="name">${esc(e.subject)}</div>${e.location ? `<div class="sub">${esc(e.location)}</div>` : ''}<div class="sub">${esc(e.organizer)}</div></div></div>`).join('');
        return header('Kalender', { searchKey: 'calendar', placeholder: 'Termine durchsuchen' }) + `<div class="stagger">${list.length ? rows : '<div class="empty">Keine Termine gefunden.</div>'}</div>`;
      }
      function renderContacts() {
        const needle = q.contacts.trim().toLowerCase();
        const list = contacts.filter((c) => !needle || c.displayName.toLowerCase().includes(needle) || c.email.toLowerCase().includes(needle));
        const rows = list.map((c) => `
          <div class="c-row"><div class="avatar">${initials(c.displayName)}</div>
            <div style="flex:1;min-width:0"><div class="name">${esc(c.displayName)}</div><div class="sub">${esc(c.email)}</div><div class="sub">${esc(c.company)}</div></div></div>`).join('');
        return header('Kontakte', { searchKey: 'contacts', placeholder: 'Kontakte durchsuchen' }) + `<div class="stagger">${list.length ? rows : '<div class="empty">Keine Kontakte gefunden.</div>'}</div>`;
      }
      const sw2 = (on) => `<div class="switch ${on ? 'on' : ''}"></div>`;
      function renderSettings() {
        const mlist = mbxList().map((m) => `
          <div class="item"><div class="grow"><div class="item-title">${esc(m.name)}</div><div class="item-sub">${esc(m.addr)}</div></div>
            <span class="kindtag">${KIND_LABEL[m.kind]}</span></div>`).join('');
        const alist = accounts.map((a) => `
          <div class="item" onclick="switchAccount('${a.id}')"><div class="avatar" style="width:40px;height:40px;margin-right:0">${initials(a.name)}</div>
            <div class="grow"><div class="item-title">${esc(a.name)}</div><div class="item-sub">${esc(a.email)}</div></div>
            ${a.id === currentAccount ? '<span class="check">✓</span>' : ''}</div>`).join('');
        return `
          <div class="settings-head">Einstellungen</div>
          <div class="section-title">Konten</div>
          <div class="card">${alist}
            <div class="item" onclick="toast('Konto hinzufügen (Demo)')"><div class="grow"><div class="item-title add-text">＋ Konto hinzufügen</div></div></div>
          </div>
          <div class="section-title">Postfächer &amp; Freigaben</div>
          <div class="card">${mlist}
            <div class="item" onclick="toast('Freigegebenes Postfach hinzufügen (Demo)')"><div class="grow"><div class="item-title add-text">＋ Freigegebenes Postfach hinzufügen</div></div></div>
          </div>
          <div class="section-title">Synchronisierung</div>
          <div class="card">
            <div class="item" onclick="toast('Sync-Zeitraum (Demo)')"><div class="grow"><div class="item-title">Sync-Zeitraum</div><div class="item-sub">Wie weit zurück Mails geladen werden</div></div>
              <div class="item-value">${esc(labelOf(WINDOW_OPTS, settings.syncWindow))}</div><span class="chev">›</span></div>
            <div class="item" onclick="toast('Aktualisierung (Demo)')"><div class="grow"><div class="item-title">Aktualisierung</div></div>
              <div class="item-value">${esc(labelOf(INTERVAL_OPTS, settings.syncInterval))}</div><span class="chev">›</span></div>
            <div class="item" onclick="flip('push')"><div class="grow"><div class="item-title">Push (DirectPush)</div><div class="item-sub">Neue Mails sofort</div></div>${sw2(settings.push)}</div>
            <div class="item" onclick="flip('background')"><div class="grow"><div class="item-title">Hintergrund-Aktualisierung</div></div>${sw2(settings.background)}</div>
            <div class="item" onclick="flip('wifiOnly')"><div class="grow"><div class="item-title">Nur über WLAN</div></div>${sw2(settings.wifiOnly)}</div>
          </div>
          <div class="section-title">Sicherheit</div>
          <div class="card">
            <div class="item" onclick="flip('appLock')"><div class="grow"><div class="item-title">App-Sperre (Face ID)</div></div>${sw2(settings.appLock)}</div>
            <div class="item"><div class="grow"><div class="item-title">Zertifikat-Pinning</div><div class="item-sub">Nur vertraute Server (fail-closed)</div></div><span class="pill-on">Aktiv</span></div>
            <div class="item"><div class="grow"><div class="item-title">Lokale Verschlüsselung</div><div class="item-sub">SQLCipher AES-256</div></div><span class="pill-on">Aktiv</span></div>
          </div>
          <div class="section-title">Über</div>
          <div class="card"><div class="item"><div class="grow"><div class="item-title">Version</div></div><div class="item-value">1.0.0 (Vorschau)</div></div></div>
          <div style="height:var(--lg)"></div>`;
      }

      function renderDrawer() {
        const a = acct();
        if (drawerView === 'accounts') {
          const rows = accounts.map((x) => `
            <div class="mbx ${x.id === currentAccount ? 'active' : ''}" onclick="switchAccount('${x.id}')">
              <div class="avatar" style="width:34px;height:34px;margin-right:0">${initials(x.name)}</div>
              <div class="grow"><div class="mn">${esc(x.name)}</div><div class="sub">${esc(x.email)}</div></div>
              ${x.id === currentAccount ? '<span class="check">✓</span>' : ''}</div>`).join('');
          drawerPanel.innerHTML = `
            <div class="drawer-acct" onclick="drawerView='folders';renderDrawer()"><div class="ava">${initials(a.name)}</div>
              <div class="grow"><div class="an">Konto wählen</div></div>${svg(I.chevDown)}</div>
            ${rows}
            <div class="mbx" onclick="toast('Konto hinzufügen (Demo)')"><div class="grow"><div class="mn add-text">＋ Konto hinzufügen</div></div></div>`;
          return;
        }
        const folders = foldersFor(currentMailbox);
        const frows = folders.map((f) => `
          <div class="frow ${f.id === currentFolder ? 'active' : ''} ${f.parent ? 'depth1' : ''}" onclick="selectFolder('${f.id}')">
            ${svg(FI[f.type] || FI.custom)}<span class="fname">${esc(f.name)}</span>
            ${unreadIn(f.id) ? `<span class="badge">${unreadIn(f.id)}</span>` : ''}</div>`).join('');
        const mrows = mbxList().map((m) => `
          <div class="mbx ${m.id === currentMailbox ? 'active' : ''}" onclick="selectMailbox('${m.id}')">
            ${svg(I.mail)}<div class="grow"><div class="mn">${esc(m.name)}</div><div class="sub">${esc(m.addr)}</div></div>
            ${m.kind !== 'primary' ? `<span class="kindtag">${KIND_LABEL[m.kind]}</span>` : ''}</div>`).join('');
        drawerPanel.innerHTML = `
          <div class="drawer-acct" onclick="drawerView='accounts';renderDrawer()">
            <div class="ava">${initials(a.name)}</div>
            <div class="grow"><div class="an">${esc(a.name)}</div><div class="ae">${esc(a.email)}</div></div>${svg(I.chevDown)}</div>
          <div class="drawer-section">Postfächer</div>${mrows}
          <div class="drawer-section">Ordner</div>${frows}
          <div class="mbx" onclick="toast('Ordner verwalten (Demo)')" style="margin-top:auto"><div class="grow"><div class="mn add-text">Ordner verwalten…</div></div></div>`;
      }

      function renderBody() {
        if (tab === 'mail') {
          if (mailRoute.name === 'message') return renderMessage(mailRoute.id);
          if (mailRoute.name === 'compose') return renderCompose(mailRoute.replyId);
          return renderMailList();
        }
        if (tab === 'calendar') return renderCalendar();
        if (tab === 'contacts') return renderContacts();
        return renderSettings();
      }
      function playAnim() {
        const map = { forward: 'inForward', back: 'inBack', fade: 'inFade', none: null };
        const name = map[pendingAnim]; pendingAnim = 'fade';
        if (!name) return;
        screenEl.style.animation = 'none'; void screenEl.offsetWidth; screenEl.style.animation = name + ' .28s ease';
      }
      function render(keepScroll) {
        const y = screenEl.scrollTop;
        screenEl.innerHTML = renderBody();
        tabbarEl.innerHTML = TABS.map((t) => `<div class="tab ${t.key === tab ? 'active' : ''}" onclick="setTab('${t.key}')">${svg(t.icon)}<span class="tablabel">${t.label}</span></div>`).join('');
        if (keepScroll) screenEl.scrollTop = y; else { screenEl.scrollTop = 0; playAnim(); }
      }
      function rerender() { render(true); }

      function setTab(t) { if (t === tab) return; tab = t; pendingAnim = 'fade'; render(); }
      function openMessage(id) { const m = byId(id); if (m && !m.read) m.read = true; tab = 'mail'; mailRoute = { name: 'message', id }; pendingAnim = 'forward'; render(); }
      function goList() { mailRoute = { name: 'list' }; pendingAnim = 'back'; render(); }
      function openCompose() { mailRoute = { name: 'compose' }; pendingAnim = 'forward'; render(); }
      function replyTo(id) { mailRoute = { name: 'compose', replyId: id }; pendingAnim = 'forward'; render(); }
      function toggleRead(id) { const m = byId(id); m.read = !m.read; render(true); }
      function toggleFlag(id) { const m = byId(id); m.flagged = !m.flagged; toast(m.flagged ? 'Markiert' : 'Markierung entfernt'); render(true); }
      function archive(id) { byId(id).folderId = 'archive'; toast('Archiviert'); goList(); }
      function del(id) { byId(id).folderId = 'deleted'; toast('In Gelöschte verschoben'); goList(); }
      function sendMail() { const to = (document.getElementById('c-to') || {}).value || ''; if (!to.trim()) { toast('Empfänger fehlt'); return; } toast('In Outbox — wird gesendet'); goList(); }
      function flip(key) { settings[key] = !settings[key]; render(true); }

      function openDrawer() { drawerView = 'folders'; drawerOpen = true; renderDrawer(); drawerEl.classList.add('open'); }
      function closeDrawer() { drawerOpen = false; drawerEl.classList.remove('open'); }
      function selectFolder(id) { currentFolder = id; mailRoute = { name: 'list' }; q.mail = ''; closeDrawer(); pendingAnim = 'fade'; render(); }
      function selectMailbox(id) { currentMailbox = id; currentFolder = 'inbox'; q.mail = ''; renderDrawer(); pendingAnim = 'fade'; render(); }
      function switchAccount(id) {
        currentAccount = id; currentMailbox = 'primary'; currentFolder = 'inbox'; q.mail = '';
        drawerView = 'folders';
        if (drawerOpen) renderDrawer();
        toast('Konto: ' + acct().name);
        render();
      }

      render();
      if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    </script>
  </body>
